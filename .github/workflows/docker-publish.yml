name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - "official-templates/pytorch/**"
      - "official-templates/shared/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || vars.DOCKERHUB_USERNAME || 'youraveragedev' }}

jobs:
  pytorch:
    name: PyTorch Runpod images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          source: .
          files: |
            official-templates/shared/versions.hcl
            official-templates/pytorch/docker-bake.hcl
          push: true
